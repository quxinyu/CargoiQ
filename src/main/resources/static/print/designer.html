<!doctype html>
<html>
	<head>
		<title>Web Reporter Designer</title>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	</head>
	
	<body>
		<script>
			function getCookie(cname) {
				var name = cname + "=";
				var ca = document.cookie.split(';');
				for (var i = 0; i < ca.length; i++) {
					var c = ca[i].trim();
					if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
				}
				return "";
			}
			window.config={
				urlPrefix: '/api/report',
				storageType: 'simple',
				dataSourceEditable: true,
				enableTemplateManager: true,
				enableShareScriptManager: true,
				customerName: 'test2',
				customerSig: 'e379ecb076',
				leftPanelTabOrder: 'TemplateManager,DataSourceManager,Outline,ShareScriptManager',
				autoBindRowDataSource: true,
				ignoreTemplateDataSource: true,
				headers: function() {
					// let token = getCookie('token');
                    let token = localStorage.getItem('accessToken');
                    let loginUserVO = JSON.parse(localStorage.getItem('loginUserVO'));
					let t = localStorage.getItem('baseTemplateMakeType');
					return {
						Authorization: 'Bearer ' + token,
						type: encodeURIComponent((t || '') + ''),
                        'access-token': token,
                        tenantBuId: loginUserVO.tenantBuId,
                        tenantId: loginUserVO.tenantId,
					}
				},
				requestIntercept: function(requestOptions) {
                    // let originalError = requestOptions.error;
                    // let newError = function(data) {};
                    // requestOptions.error = newError;
                    // originalSuccess.apply(this, arguments);
                    // console.log('originalSuccess', originalSuccess);
                    // console.log('[requestIntercept] success payload', responseData);
                    
					var originalSuccess = requestOptions.success;
					requestOptions.success = function(responseData) {
						if (responseData && responseData.code === 500) {
                            requestOptions.error(responseData.message);
							return;
						}
						if (typeof originalSuccess === 'function') {
							originalSuccess.apply(this, arguments);
						}
					};
				},
				dataSourceTemplatePreprocessor: function(content) {
					content=content.trim();
					if (content.toLowerCase().indexOf('select')==0) {
						let newContent = '/// type=sql\n' + JSON.stringify({
							sql: content,
							driver: "com.mysql.jdbc.Driver",
							jdbcUrl: "jdbc:mysql://localhost:3306/jun",
							user: "root",
							password: "123456",
						});
						return newContent;
					}
					return content;
				},
				dataSourceTemplateParser: {
					accept: function(content) {
                        //个性化数据源需要的判断表示，原码是通过判断创建数据源时，是否带有注解“/// type=ckey”，有则走个性化数据源
                        // 为了方便使用，重写了源码的逻辑，只要包含‘REPORT_’就认为需要走个性化数据源，因此在创建个性化数据源code 的时候，需要有固定前缀“REPORT_”
						if(content.indexOf('REPORT_')==0) {
							return true;
						}
                        alert("数据源 code 需要以 REPORT_ 开头");
						return false;
					},
					parse: function(content,entity) {
                        var children;
                        var token = localStorage.getItem('accessToken');
                        //请求获取数据源
                        jQuery.ajax({
                            async:false,
                            method: "GET",
                            url: '/api/report/dataSourceTemplateManager/getTemplate?id=' + entity.id,
                            headers: {
                                Authorization: 'Bearer ' + token,
                                'access-token': token,
                            },
                            success: function(responseData) {
                                // responseData 已经是对象
                                console.log(responseData);
                                children = JSON.parse(responseData.children);
                            },
                            error: function(xhr) {
                                console.error("请求失败", xhr.status, xhr.responseText);
                            }
                        });
                        return {
							// expression: '='+ckey,
							children: children
						}
					}
				},
                dataSourceFieldMetasProvider: function(obj) {
                    return {
                        dsCode: obj.code
                    }
                },
                refreshLinkedDataSourceList: function(templateData) {
                    function getTemplate(codes) {
                        var dataSourceList;
                        var token = localStorage.getItem('accessToken');
                        let loginUserVO = JSON.parse(localStorage.getItem('loginUserVO'));
                        //请求获取数据源
                        jQuery.ajax({
                            async:false,
                            method: "GET",
                            url: '/api/report/dataSourceTemplateManager/getTemplatesByCode?codes='+codes,
                            headers: {
                                Authorization: 'Bearer ' + token,
                                'access-token': token,
                            },
                            success: function(responseData) {
                                dataSourceList = responseData;
                            },
                            error: function(xhr) {
                                console.error("请求失败", xhr.status, xhr.responseText);
                            }
                        });
                        return dataSourceList;
                    }
                    function unescapeXml(xml) {
                        return xml.replace(/&lt;/g, '<')
                            .replace(/&gt;/g, '>')
                            .replace(/&amp;/g, '&')
                            .replace(/&quot;/g, '"')
                            .replace(/&apos;/g, '\'')
                            .replace(/&#32;/g, ' ');
                    }

                    let decoded=unescapeXml(templateData);
                    let regexp=/\<bind\>([\s\S]*?)\<\/bind\>/g;
                    let matches=[...decoded.matchAll(regexp)];
                    let dataSourceCodeList=[];
                    for(let matchGroups of matches) {
                        try {
                            let bind=matchGroups[1];
                            let split=bind.indexOf('///');
                            if (split>=0) {
                                let comment=bind.substring(split+3);
                                let metas=JSON.parse(comment);
                                let dsCode=metas.dsCode;
                                if (dsCode) {
                                    if(!dataSourceCodeList.find((e)=> e.name==dsCode)) {
                                        dataSourceCodeList.push(dsCode);
                                    }
                                }
                            }
                        } catch (e) {
                            console.log(e);
                        }
                    }
                    return getTemplate(dataSourceCodeList.join(","));
                },
				defaultFontSize: '10.5', // 14px
			}
		</script>
		<script src='designer-entry.js'>
		</script>
		<script>
			xmreport.outlineApi.addTemplateChangeListener((root)=> {
				let pageNodes = root.getChildren(); // pages
				console.log(pageNodes);
			});

			console.log(xmreport.outlineApi.getRoot());
		</script>
	</body>
</html>
